name: deploy

# Auto-deploys the scanner to the Contabo VPS on every push to main.
# Build-on-VPS: SSHes in, pulls latest source, rebuilds the image, restarts.
# No GHCR / registry login needed.
#
# One-time setup before this works — add these repo secrets
# (Settings -> Secrets and variables -> Actions):
#   VPS_HOST     -> 207.180.217.159
#   VPS_USER     -> deploy
#   VPS_SSH_KEY  -> the deploy user's private SSH key
#   VPS_PORT     -> 22 (optional; defaults to 22)
#
# And on the VPS, once (see deploy/RUNBOOK.md):
#   git clone https://github.com/petersafwat11/upwork-leads.git /opt/upwork-scanner
#   cd /opt/upwork-scanner && cp .env.example .env && nano .env   # chmod 600 .env
#   docker compose up -d --build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".claude/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-scanner
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull, rebuild, restart on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/upwork-scanner
            echo "==> Pulling latest source"
            git pull --ff-only origin main
            echo "==> Rebuilding + restarting"
            docker compose up -d --build
            echo "==> Pruning dangling images"
            docker image prune -f
            echo "==> Status"
            docker compose ps
