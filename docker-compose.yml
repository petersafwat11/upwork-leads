# Production stack for the Upwork job scanner — runs on the Contabo VPS at
# /opt/upwork-scanner/docker-compose.yml (alongside the restaurant stack at
# /opt/restaurant). Internal-only: nothing is published to the host, the
# scanner just runs on a cron and pushes matches to Slack.
#
# The scanner builds from source on the VPS (no GHCR). Secrets/config come from
# the .env file you place next to this compose file (chmod 600, never committed).
#
# Operations:
#   first run:  cp .env.example .env && nano .env && docker compose up -d --build
#   deploy:     git pull && docker compose up -d --build && docker image prune -f
#   logs:       docker compose logs -f --tail=200 scanner
#   restart:    docker compose restart scanner

services:
  scanner:
    build: .
    init: true
    # All user config (Slack webhook, SMTP, Upwork URL, thresholds) is injected
    # from .env. The `environment` block below overrides the few values that
    # must differ inside the container (it takes precedence over env_file).
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      FETCH_METHOD: flaresolverr
      FLARESOLVERR_URL: http://flaresolverr:8191
      # Container-local time = Cairo so the daily lead report fires at 8 AM
      # local (REPORT_CRON_SCHEDULE default "0 8 * * *"). Needs tzdata (in image).
      TZ: Africa/Cairo
      # Min score to send a lead. Set here (overrides the VPS .env) so it can be
      # changed via git push. To hand control back to the VPS .env, remove this.
      MIN_SCORE: "7"
    volumes:
      # Named volume persists sent-links.json / run-history.json across
      # redeploys so the scanner doesn't re-send leads after every push.
      # On first creation Docker copies data/tracker.js from the image into
      # the volume; see RUNBOOK if you change tracker.js logic.
      - scanner-data:/app/data
    depends_on:
      - flaresolverr
    restart: unless-stopped

  flaresolverr:
    # Solves Cloudflare challenges so the scanner can fetch Upwork pages.
    image: ghcr.io/flaresolverr/flaresolverr:latest
    init: true
    environment:
      - LOG_LEVEL=info
      - TZ=UTC
    restart: unless-stopped

volumes:
  scanner-data:
